services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: winrepo
      POSTGRES_PASSWORD: winrepo
      POSTGRES_DB: winrepo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports: ["5432:5432"]
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports: ["4000:4000"]
    depends_on: [postgres]
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
